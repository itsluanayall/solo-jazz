<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generate random jazz and basic dance step combinations for solo practice. Perfect for jazz dancers to improve improvisation skills.">
    <meta property="og:title" content="Jazz Solo Practice">
    <meta property="og:description" content="Generate random jazz and basic dance step combinations for solo practice.">
    <meta property="og:type" content="website">
    <title>Jazz Solo Practice</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <main>
        <div class="stage">
        <div class="display" id="display" aria-live="polite">
            <div class="display-placeholder">Tap to generate a combination</div>
        </div>

        <div class="step-marquee" id="stepMarquee"></div>

        <button class="hit-zone" id="hitZone">
            <svg class="icon" role="img" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>Generate</title>
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
            </svg>
            <span class="label">Generate</span>
        </button>
    </div>

        <footer class="signature">Made with ♥<br>by itsluanayall</footer>

        <div class="header-toggles">
        <button class="share-toggle" id="shareToggle" title="Share" aria-label="Share">
            <svg role="img" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>Share</title>
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/>
            </svg>
        </button>
        <button class="settings-toggle" id="settingsToggle" title="Settings" aria-label="Settings">
            <svg role="img" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>Settings</title>
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
            </svg>
        </button>
    </div>

    <div class="drawer" id="drawer" aria-hidden="true">
        <div class="drawer-handle" id="drawerHandle" role="button" tabindex="0" aria-label="Open settings">
            <svg role="img" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <title>Drawer handle</title>
                <line x1="5" x2="19" y1="12" y2="12"/>
            </svg>
        </div>
        <div class="drawer-content">
            <div class="drawer-section">
                <div class="drawer-label">Steps start on</div>
                <div class="mode-chips" id="modeChips">
                    <button class="chip active" data-mode="1">1 only</button>
                    <button class="chip" data-mode="8">8 only</button>
                    <button class="chip" data-mode="mixed">Mixed</button>
                </div>
            </div>

            <div class="drawer-section">
                <div class="drawer-label">Count</div>
                <div class="count-steppers">
                    <div class="stepper">
                        <span class="stepper-label" id="jazzLabel">Jazz</span>
                        <div class="stepper-control" role="group" aria-labelledby="jazzLabel">
                            <button class="stepper-btn" data-target="jazzCount" data-delta="-1" aria-label="Decrease jazz steps">
                                <svg role="img" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <title>Decrease</title>
                                    <path d="M5 12h14"/>
                                </svg>
                            </button>
                            <span class="stepper-value" id="jazzCount">2</span>
                            <button class="stepper-btn" data-target="jazzCount" data-delta="1" aria-label="Increase jazz steps">
                                <svg role="img" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <title>Increase</title>
                                    <path d="M5 12h14"/><path d="M12 5v14"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="stepper">
                        <span class="stepper-label" id="basicLabel">Basic</span>
                        <div class="stepper-control" role="group" aria-labelledby="basicLabel">
                            <button class="stepper-btn" data-target="basicCount" data-delta="-1" aria-label="Decrease basic steps">
                                <svg role="img" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <title>Decrease</title>
                                    <path d="M5 12h14"/>
                                </svg>
                            </button>
                            <span class="stepper-value" id="basicCount">1</span>
                            <button class="stepper-btn" data-target="basicCount" data-delta="1" aria-label="Increase basic steps">
                                <svg role="img" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <title>Increase</title>
                                    <path d="M5 12h14"/><path d="M12 5v14"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Share QR Code Modal -->
    <div class="share-modal" id="shareModal" role="dialog" aria-modal="true">
        <div class="share-modal-content">
            <button class="share-modal-close" id="shareModalClose" aria-label="Close">
                <svg role="img" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <title>Close</title>
                    <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
                </svg>
            </button>
            <div class="share-modal-header">Share with a fellow dancer!</div>
            <div class="share-modal-qr" id="shareQrCode"></div>
            <div class="share-modal-url" id="shareUrl"></div>
            <div class="share-buttons">
                <button class="share-btn share-btn-whatsapp" data-platform="whatsapp" aria-label="Share on WhatsApp">
                    <svg role="img" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <title>WhatsApp</title>
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                    </svg>
                    <span>WhatsApp</span>
                </button>
                <button class="share-btn share-btn-telegram" data-platform="telegram" aria-label="Share on Telegram">
                    <svg role="img" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <title>Telegram</title>
                        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
                    </svg>
                    <span>Telegram</span>
                </button>
                <button class="share-btn share-btn-copy" data-platform="copy" aria-label="Copy link">
                    <svg role="img" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <title>Copy link</title>
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span>Copy Link</span>
                </button>
            </div>
        </div>
    </div>

    </main>
    <script src="script.js"></script>
</body>
</html>
