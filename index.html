<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jazz Solo Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stage">
        <div class="display" id="display">
            <div class="display-placeholder">Tap to generate a combination</div>
        </div>

        <div class="hit-zone" id="hitZone">
            <span class="icon">↻</span>
            <span class="label">Generate</span>
        </div>

        <div class="step-marquee" id="stepMarquee"></div>
    </div>

    <div class="settings-toggle" id="settingsToggle">⚙</div>

    <div class="drawer" id="drawer">
        <div class="drawer-handle" id="drawerHandle">═══</div>
        <div class="drawer-content">
            <div class="drawer-section">
                <div class="drawer-label">Steps start on</div>
                <div class="mode-chips" id="modeChips">
                    <button class="chip active" data-mode="1">1 only</button>
                    <button class="chip" data-mode="8">8 only</button>
                    <button class="chip" data-mode="mixed">Mixed</button>
                </div>
            </div>

            <div class="drawer-section">
                <div class="drawer-label">Count</div>
                <div class="count-steppers">
                    <div class="stepper">
                        <span class="stepper-label">Jazz</span>
                        <div class="stepper-control">
                            <button class="stepper-btn" data-target="jazzCount" data-delta="-1">−</button>
                            <span class="stepper-value" id="jazzCount">2</span>
                            <button class="stepper-btn" data-target="jazzCount" data-delta="1">+</button>
                        </div>
                    </div>
                    <div class="stepper">
                        <span class="stepper-label">Basic</span>
                        <div class="stepper-control">
                            <button class="stepper-btn" data-target="basicCount" data-delta="-1">−</button>
                            <span class="stepper-value" id="basicCount">1</span>
                            <button class="stepper-btn" data-target="basicCount" data-delta="1">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
