<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jazz Solo Improv Practice</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a1e;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.75rem;
            font-weight: 600;
        }

        .controls {
            background: #2a2a2e;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .control-group {
            margin-bottom: 1.25rem;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #a0a0a0;
        }

        .toggle-group {
            display: flex;
            gap: 0.5rem;
        }

        .toggle-btn {
            flex: 1;
            padding: 0.6rem 0.75rem;
            border: 1px solid #3a3a3e;
            background: #252529;
            color: #b0b0b0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s ease;
        }

        .toggle-btn:hover {
            background: #303034;
        }

        .toggle-btn.active {
            background: #5c7aff;
            border-color: #5c7aff;
            color: white;
        }

        input[type="number"] {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid #3a3a3e;
            background: #252529;
            color: white;
            border-radius: 6px;
            font-size: 1rem;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #5c7aff;
        }

        .generate-btn {
            width: 100%;
            padding: 1rem;
            background: #5c7aff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .generate-btn:hover {
            background: #4a6aef;
        }

        .result {
            background: #2a2a2e;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-section {
            margin-bottom: 1rem;
        }

        .result-section:last-child {
            margin-bottom: 0;
        }

        .result-label {
            font-size: 0.8rem;
            color: #707070;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .result-steps {
            font-size: 1.5rem;
            font-weight: 500;
            line-height: 1.4;
        }

        .placeholder {
            color: #505055;
            font-size: 1.1rem;
        }

        .divider {
            color: #404045;
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Jazz Solo Improv Practice</h1>

        <div class="controls">
            <div class="control-group">
                <label>Jazz Steps (start on)</label>
                <div class="toggle-group" id="stepToggle">
                    <button class="toggle-btn active" data-value="1">1 only</button>
                    <button class="toggle-btn" data-value="8">8 only</button>
                    <button class="toggle-btn" data-value="mixed">Mixed</button>
                </div>
            </div>

            <div class="control-group">
                <label for="jazzCount">Jazz Steps (N)</label>
                <input type="number" id="jazzCount" value="2" min="1" max="10">
            </div>

            <div class="control-group">
                <label for="basicCount">Basic Steps (M)</label>
                <input type="number" id="basicCount" value="1" min="0" max="10">
            </div>

            <button class="generate-btn" id="generateBtn">Generate</button>
        </div>

        <div class="result" id="result">
            <div class="placeholder">Click Generate to start</div>
        </div>
    </div>

    <script>
        const jazzSteps = {
            startOn1: ['Rocks', 'Sis-ka-boom-sha', 'Scissor Kicks', 'Camel Walk'],
            startOn8: ['Apple Jacks', 'Shorty George', 'Suzie Q', 'Tacky Annie']
        };

        const basicSteps = ['Heel', 'Groove', 'Triples'];

        let selectedMode = '1'; // '1', '8', or 'mixed'

        // Toggle handling
        const toggleBtns = document.querySelectorAll('.toggle-btn');
        toggleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                toggleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedMode = btn.dataset.value;
            });
        });

        // Random pick unique items from array, capped at pool size
        function pickRandom(arr, count) {
            const actualCount = Math.min(count, arr.length);
            const shuffled = [...arr].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, actualCount);
        }

        // Random pick unique items, excluding already picked
        function pickRandomExcluding(arr, count, exclude) {
            const available = arr.filter(item => !exclude.includes(item));
            return pickRandom(available, count);
        }

        // Generate
        document.getElementById('generateBtn').addEventListener('click', () => {
            const n = parseInt(document.getElementById('jazzCount').value) || 2;
            const m = parseInt(document.getElementById('basicCount').value) || 1;

            // Validate Mixed mode
            if (selectedMode === 'mixed' && n < 2) {
                document.getElementById('result').innerHTML = '<div class="placeholder">Mixed mode needs at least 2 Jazz steps (one from each category)</div>';
                return;
            }

            let selectedJazz = [];

            if (selectedMode === '1') {
                selectedJazz = pickRandom(jazzSteps.startOn1, n);
            } else if (selectedMode === '8') {
                selectedJazz = pickRandom(jazzSteps.startOn8, n);
            } else {
                // Mixed: guarantee at least 1 from each category
                const oneFrom1 = pickRandom(jazzSteps.startOn1, 1);
                const oneFrom8 = pickRandom(jazzSteps.startOn8, 1);
                const remainingCount = n - 2;
                const mixedPool = [...jazzSteps.startOn1, ...jazzSteps.startOn8];
                const alreadyPicked = [...oneFrom1, ...oneFrom8];
                const remaining = pickRandomExcluding(mixedPool, remainingCount, alreadyPicked);
                selectedJazz = [...oneFrom1, ...oneFrom8, ...remaining].sort(() => Math.random() - 0.5);
            }

            const selectedBasic = pickRandom(basicSteps, m);

            const resultDiv = document.getElementById('result');
            let html = '';

            if (selectedJazz.length > 0) {
                html += `
                    <div class="result-section">
                        <div class="result-label">Jazz Steps</div>
                        <div class="result-steps">${selectedJazz.join(' • ')}</div>
                    </div>
                `;
            }

            if (selectedJazz.length > 0 && selectedBasic.length > 0) {
                html += `<div class="divider">—</div>`;
            }

            if (selectedBasic.length > 0) {
                html += `
                    <div class="result-section">
                        <div class="result-label">Basic Steps</div>
                        <div class="result-steps">${selectedBasic.join(' • ')}</div>
                    </div>
                `;
            }

            resultDiv.innerHTML = html;
        });
    </script>
</body>
</html>
